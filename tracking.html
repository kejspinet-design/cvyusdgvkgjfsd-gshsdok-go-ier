    <style>
        /* Allow scroll and fix scroll issues */
        body {
            overflow-y: auto !important;
            overflow-x: hidden !important;
            height: 100vh !important;
            min-height: 100vh !important;
            background: #1a1d29;
        }
        
        .container {
            overflow-y: auto !important;
            overflow-x: hidden !important;
            height: 100vh !important;
            min-height: 100vh !important;
        }
        
        /* Animated Background */
        .animated-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .floating-dots {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(185, 28, 28, 0.6);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }
        
        .dot:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; animation-duration: 15s; }
        .dot:nth-child(2) { left: 20%; top: 80%; animation-delay: 2s; animation-duration: 18s; }
        .dot:nth-child(3) { left: 30%; top: 40%; animation-delay: 4s; animation-duration: 22s; }
        .dot:nth-child(4) { left: 40%; top: 60%; animation-delay: 1s; animation-duration: 20s; }
        .dot:nth-child(5) { left: 50%; top: 30%; animation-delay: 3s; animation-duration: 17s; }
        .dot:nth-child(6) { left: 60%; top: 70%; animation-delay: 5s; animation-duration: 19s; }
        .dot:nth-child(7) { left: 70%; top: 50%; animation-delay: 2.5s; animation-duration: 21s; }
        .dot:nth-child(8) { left: 80%; top: 25%; animation-delay: 4.5s; animation-duration: 16s; }
        .dot:nth-child(9) { left: 90%; top: 75%; animation-delay: 1.5s; animation-duration: 23s; }
        .dot:nth-child(10) { left: 15%; top: 55%; animation-delay: 3.5s; animation-duration: 18s; }
        
        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            25% {
                transform: translate(30px, -30px) scale(1.2);
                opacity: 0.6;
            }
            50% {
                transform: translate(-20px, 20px) scale(0.8);
                opacity: 0.4;
            }
            75% {
                transform: translate(20px, 30px) scale(1.1);
                opacity: 0.5;
            }
        }
        
        .red-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(185, 28, 28, 0.15) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.8;
            }
        }
        
        /* HEADER OVERRIDE - FORCE STYLES */
        .header {
            background: rgba(10, 10, 15, 0.05) !important;
            padding: 1.5rem 2.5rem !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border: none !important;
            box-shadow: none !important;
        }
        
        .header::before {
            display: none !important;
        }
        
        .tracking-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .tracking-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .tracking-title {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #b91c1c 0%, #ef4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        
        .tracking-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .add-player-section {
            background: rgba(37, 40, 54, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(185, 28, 28, 0.2);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 32px;
        }
        
        .add-player-form {
            display: flex;
            gap: 16px;
        }
        
        .tracking-input {
            flex: 1;
            padding: 18px 24px;
            background: rgba(26, 29, 41, 0.9);
            border: 2px solid rgba(185, 28, 28, 0.2);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .tracking-input:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 
                inset 0 2px 4px rgba(0, 0, 0, 0.2),
                0 0 0 4px rgba(185, 28, 28, 0.2),

            transform: translateY(-2px);
        }
        
        .tracking-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .add-button {

            background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%);

        }
        
        .add-button:hover {

        .tracked-players-list {
            display: grid;

        @media (min-width: 1400px) {

        @media (max-width: 768px) {

    <script>
        // Tracking functionality
        let trackedPlayers = JSON.parse(localStorage.getItem('trackedPlayers') || '[]');
        let serversData = [];
        let reportsData = [];
        
        // Fetch reports data
        async function fetchReports() {
            try {
                const response = await fetch('/api/reports');
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }
                
                const data = await response.json();
                reportsData = Array.isArray(data) ? data : (data.reports || data.data || []);
                console.log('[Tracking] Reports loaded:', reportsData.length);
                
                if (reportsData.length > 0) {
                    console.log('[Tracking] Sample report:', reportsData[0]);
                }
                
                return reportsData;
            } catch (error) {
                console.error('[Tracking] Error fetching reports:', error);
                return [];
            }
        }
        
        // Check if player has reports
        function getPlayerReports(steamId) {
            console.log('[Tracking] Checking reports for Steam ID:', steamId);
            console.log('[Tracking] Total reports:', reportsData.length);
            
            if (reportsData.length > 0) {
                console.log('[Tracking] Sample report structure:', reportsData[0]);
            }
            
            const reports = reportsData.filter(report => {
                // Normalize Steam IDs (remove spaces and quotes)
                const intruderSteamId = String(report.intruder_steamid || '').trim();
                const checkSteamId = String(steamId).trim();
                
                const match = intruderSteamId === checkSteamId;
                
                if (match) {
                    console.log('[Tracking] Found matching report:', report);
                }
                
                return match;
            });
            
            console.log('[Tracking] Found reports count:', reports.length);
            return reports.length;
        }
        
        // Extract Steam ID from various formats
        function extractSteamId(input) {
            input = input.trim();
            
            // Already a Steam ID
            if (/^765\d{14}$/.test(input)) {
                return input;
            }
            
            // Steam profile URL
            const profileMatch = input.match(/steamcommunity\.com\/profiles\/(\d+)/);
            if (profileMatch) {
                return profileMatch[1];
            }
            
            // Steam ID URL
            const idMatch = input.match(/steamcommunity\.com\/id\/([^\/]+)/);
            if (idMatch) {
                alert('Пожалуйста, используйте Steam ID (числовой) или ссылку на профиль с числовым ID');
                return null;
            }
            
            return input;
        }
        
        // Fetch servers data
        async function fetchServers() {
            try {
                const response = await fetch('/api/fear?action=servers');
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }
                
                const data = await response.json();
                serversData = Array.isArray(data) ? data : (data.servers || data.data || []);
                console.log('[Tracking] Servers loaded:', serversData.length);
                return serversData;
            } catch (error) {
                console.error('[Tracking] Error fetching servers:', error);
                return [];
            }
        }
        
        // Check if player is online
        function checkPlayerOnline(steamId) {
            for (const server of serversData) {
                const liveData = server.live_data || {};
                const players = liveData.players || [];
                
                const found = players.find(p => p.steam_id === steamId);
                if (found) {
                    return {
                        online: true,
                        server: server.site_name || 'Unknown Server',
                        serverIp: server.ip || '',
                        serverPort: server.port || '',
                        playerData: found // Возвращаем полные данные игрока
                    };
                }
            }
            return { online: false, playerData: null };
        }
        
        // Update player info from Steam API
        async function updatePlayerInfo(player) {
            try {
                const response = await fetch(`/api/player?steamid=${player.steamId}`);
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }
                
                const profile = await response.json();
                player.name = profile.nickname || profile.name || 'Unknown';
                player.avatar = profile.avatar || 'https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg';
            } catch (error) {
                console.error('[Tracking] Error fetching player info:', error);
                player.name = player.steamId;
                player.avatar = 'https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg';
            }
        }
        
        // Render tracked players
        async function renderTrackedPlayers() {
            const list = document.getElementById('trackedPlayersList');
            
            if (trackedPlayers.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <p>Нет отслеживаемых игроков</p>
                        <p style="font-size: 14px; margin-top: 8px;">Добавьте игроков для отслеживания их активности</p>
                    </div>
                `;
                return;
            }
            
            // Update online status for all players
            for (const player of trackedPlayers) {
                const status = checkPlayerOnline(player.steamId);
                player.online = status.online;
                player.currentServer = status.server;
                player.serverIp = status.serverIp;
                player.serverPort = status.serverPort;
                player.playerData = status.playerData; // Сохраняем данные игрока (kills, deaths и т.д.)
                
                // Check reports
                player.reportsCount = getPlayerReports(player.steamId);
            }
            
            list.innerHTML = trackedPlayers.map((player, index) => {
                const connectAddress = player.serverPort ? `${player.serverIp}:${player.serverPort}` : player.serverIp;
                const hasReports = player.reportsCount > 0;
                
                // Статистика игрока
                const kills = player.playerData?.kills || 0;
                const deaths = player.playerData?.deaths || 0;
                const kd = deaths > 0 ? (kills / deaths).toFixed(2) : kills.toFixed(2);
                
                return `
                    <div class="tracked-player-card ${hasReports ? 'has-reports' : ''}">
                        ${hasReports ? `
                            <div class="report-badge">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                                    <line x1="12" y1="9" x2="12" y2="13"></line>
                                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                </svg>
                                ${player.reportsCount} ${player.reportsCount === 1 ? 'репорт' : 'репорта'}
                            </div>
                        ` : ''}
                        <div class="player-header">
                            <img src="${player.avatar || 'https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg'}" 
                                 alt="${player.name}" 
                                 class="player-avatar"
                                 onerror="this.src='https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg'">
                            <div class="player-info">
                                <div class="player-name">${player.name || 'Unknown'}</div>
                                <div class="player-steamid">${player.steamId}</div>
                            </div>
                        </div>
                        <div class="player-status">
                            <span class="status-badge ${player.online ? 'status-online' : 'status-offline'}">
                                ${player.online ? 'Онлайн' : 'Оффлайн'}
                            </span>
                            ${player.online ? `<span class="status-badge status-server" title="${player.currentServer}">${player.currentServer}</span>` : ''}
                        </div>
                        ${player.online && player.playerData ? `
                            <div class="player-stats">
                                <div class="stat-box">
                                    <div class="stat-label">K/D</div>
                                    <div class="stat-value">${kd}</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Киллы</div>
                                    <div class="stat-value kills">${kills}</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Смерти</div>
                                    <div class="stat-value deaths">${deaths}</div>
                                </div>
                            </div>
                        ` : ''}
                        <div class="player-actions">
                            <button class="action-btn" onclick="window.open('https://fearproject.ru/profile/${player.steamId}', '_blank')">
                                Профиль
                            </button>
                            ${player.online ? `<button class="action-btn" onclick="window.location.href='steam://connect/${connectAddress}'">Подключиться</button>` : ''}
                            <button class="action-btn remove-btn" onclick="removePlayer(${index})">
                                Удалить
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Add player
        async function addPlayer() {
            const input = document.getElementById('trackingInput');
            const rawInput = input.value.trim();
            
            if (!rawInput) {
                alert('Введите Steam ID или ссылку на профиль');
                return;
            }
            
            const steamId = extractSteamId(rawInput);
            if (!steamId) {
                return;
            }
            
            // Check if already tracked
            if (trackedPlayers.some(p => p.steamId === steamId)) {
                alert('Этот игрок уже отслеживается');
                return;
            }
            
            // Add player with loading state
            const newPlayer = {
                steamId: steamId,
                name: 'Загрузка...',
                avatar: 'https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg',
                online: false,
                addedAt: Date.now()
            };
            
            trackedPlayers.push(newPlayer);
            localStorage.setItem('trackedPlayers', JSON.stringify(trackedPlayers));
            input.value = '';
            
            // Уведомляем систему уведомлений об изменении
            if (window.notificationSystem) {
                window.notificationSystem.updateTrackedPlayers();
            }
            
            // Render immediately
            await renderTrackedPlayers();
            
            // Fetch player info in background
            await updatePlayerInfo(newPlayer);
            localStorage.setItem('trackedPlayers', JSON.stringify(trackedPlayers));
            await renderTrackedPlayers();
        }
        
        // Remove player
        function removePlayer(index) {
            if (confirm('Удалить этого игрока из отслеживания?')) {
                trackedPlayers.splice(index, 1);
                localStorage.setItem('trackedPlayers', JSON.stringify(trackedPlayers));
                
                // Уведомляем систему уведомлений об изменении
                if (window.notificationSystem) {
                    window.notificationSystem.updateTrackedPlayers();
                }
                
                renderTrackedPlayers();
            }
        }
        
        // Auto-refresh
        async function refresh() {
            await fetchServers();
            await fetchReports();
            await renderTrackedPlayers();
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('[Tracking] Initializing...');
            
            // Fix scroll issues after page refresh
            setTimeout(() => {
                document.body.style.overflow = 'hidden';
                document.body.style.overflowY = 'auto';
                document.body.style.overflowX = 'hidden';
                
                // Ensure scroll position is accessible
                if (window.scrollY > 0) {
                    window.scrollTo({ top: window.scrollY, behavior: 'instant' });
                }
            }, 100);
            
            // Initial load
            await fetchServers();
            await fetchReports();
            await renderTrackedPlayers();
            
            // Update player info for existing players
            for (const player of trackedPlayers) {
                if (player.name === 'Загрузка...' || !player.avatar) {
                    await updatePlayerInfo(player);
                }
            }
            localStorage.setItem('trackedPlayers', JSON.stringify(trackedPlayers));
            await renderTrackedPlayers();
            
            // Setup event listeners
            document.getElementById('addButton').addEventListener('click', addPlayer);
            document.getElementById('trackingInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addPlayer();
                }
            });
            
            // Auto-refresh every 30 seconds
            setInterval(refresh, 30000);
            
            console.log('[Tracking] Initialized successfully');
        });
    </script>
</body>
</html>
