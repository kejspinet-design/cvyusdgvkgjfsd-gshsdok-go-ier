    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1d29;
            color: white;
            font-family: 'Calluna', 'Times New Roman', serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .page-header {
            background: rgba(10, 10, 15, 0.05);
            padding: 1.5rem 2.5rem;
            border: none;
            box-shadow: none;
            flex-shrink: 0;
        }
        
        .header-content {
            display: flex;
            align-items: center;

            gap: 20px;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-logo {

        .profile-button {

            cursor: pointer;
            transition: all 0.3s ease;

        }
        
        .profile-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(102, 126, 234, 0.3);
        }
        
        .profile-avatar {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .profile-info {

            flex-direction: column;

        /* Content Wrapper with Sidebar */

    <script>
        let allTickets = [];
        
        async function loadTickets() {
            const token = localStorage.getItem('fearToken');
            if (!token) {
                console.error('[Tickets] No token found, redirecting to login');
                window.location.href = 'login.html';
                return;
            }
            
            try {
                const response = await fetch('/api/reports/recent', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json',
                        'Cache-Control': 'no-cache'
                    }
                });
                
                if (!response.ok) {
                    if (response.status === 401) {
                        console.error('[Tickets] Unauthorized, redirecting to login');
                        window.location.href = 'login.html';
                        return;
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('[Tickets] Loaded tickets:', data.length);
                console.log('[Tickets] Sample ticket:', data[0]);
                console.log('[Tickets] All ticket keys:', data[0] ? Object.keys(data[0]) : 'no data');
                
                allTickets = data;
                renderTickets(data);
            } catch (error) {
                console.error('[Tickets] Error loading tickets:', error);
                document.getElementById('loading').innerHTML = '<div class="empty-state">Ошибка загрузки данных</div>';
            }
        }
        
        function formatTimeAgo(timestamp) {
            const now = Math.floor(Date.now() / 1000);
            const diff = now - timestamp;
            
            if (diff < 60) return 'Сейчас';
            if (diff < 3600) return `${Math.floor(diff / 60)} минут назад`;
            if (diff < 86400) return `${Math.floor(diff / 3600)} часов назад`;
            return `${Math.floor(diff / 86400)} дней назад`;
        }
        
        function renderTickets(tickets) {
            const loadingEl = document.getElementById('loading');
            const tableEl = document.getElementById('tickets-table');
            const rowsEl = document.getElementById('tickets-rows');
            
            if (!tickets || tickets.length === 0) {
                loadingEl.innerHTML = '<div class="empty-state">Нет тикетов</div>';
                loadingEl.style.display = 'block';
                tableEl.style.display = 'none';
                return;
            }
            
            loadingEl.style.display = 'none';
            tableEl.style.display = 'block';
            rowsEl.innerHTML = '';
            
            // Группируем тикеты по нарушителю (steamid)
            const groupedTickets = {};
            tickets.forEach(ticket => {
                const key = ticket.intruder_steamid || ticket.violator_steamid || ticket.steamid;
                if (!groupedTickets[key]) {
                    groupedTickets[key] = [];
                }
                groupedTickets[key].push(ticket);
            });
            
            // Отображаем сгруппированные тикеты
            Object.values(groupedTickets).forEach(group => {
                const firstTicket = group[0];
                const count = group.length;
                
                // Используем правильные поля из API
                const avatarUrl = firstTicket.intruder_avatar || 'https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg';
                const playerName = firstTicket.intruder || 'Неизвестно';
                const reason = firstTicket.reason || 'Читы';
                const serverName = firstTicket.server_name || 'Неизвестно';
                
                // Парсим дату
                let timestamp;
                if (firstTicket.created_at) {
                    timestamp = Math.floor(new Date(firstTicket.created_at).getTime() / 1000);
                } else {
                    timestamp = Math.floor(Date.now() / 1000);
                }
                
                console.log('[Ticket Render]', {
                    playerName,
                    avatarUrl,
                    reason,
                    serverName,
                    count,
                    timestamp
                });
                
                const row = document.createElement('div');
                row.className = 'table-row';
                
                row.innerHTML = `
                    <div class="date-cell">${formatTimeAgo(timestamp)}</div>
                    <div class="player-cell">
                        <img src="${avatarUrl}" 
                             class="player-avatar"
                             onerror="this.src='https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg'">
                        <div class="player-name">${playerName}</div>
                    </div>
                    <div class="reason-cell">${reason}</div>
                    <div class="server-cell">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                            <line x1="12" y1="17" x2="12" y2="21"></line>
                        </svg>
                        ${serverName}
                        ${firstTicket.server_ip ? `
                            <button class="connect-button" onclick="event.stopPropagation(); connectToServer('${firstTicket.server_ip}', '${firstTicket.server_port || '27015'}')" title="Подключиться к серверу">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                                </svg>
                                Подключиться
                            </button>
                        ` : ''}
                    </div>
                    <div class="action-cell">
                        ${count > 1 ? `
                            <div class="ticket-count">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="16" y1="13" x2="8" y2="13"></line>
                                    <line x1="16" y1="17" x2="8" y2="17"></line>
                                    <polyline points="10 9 9 9 8 9"></polyline>
                                </svg>
                                ${count}
                            </div>
                        ` : ''}
                        <button class="accept-button" onclick="event.stopPropagation(); acceptTicket(${firstTicket.id || 0})">Принять</button>
                    </div>
                `;
                
                rowsEl.appendChild(row);
            });
        }
        
        // Функция подключения к серверу
        function connectToServer(serverIp, serverPort = '27015') {
            if (!serverIp) {
                alert('IP сервера не найден');
                return;
            }
            
            // Формируем ссылку для подключения через Steam
            const connectUrl = `steam://connect/${serverIp}:${serverPort}`;
            console.log('[Tickets] Connecting to server:', connectUrl);
            
            // Открываем ссылку
            window.location.href = connectUrl;
            
            // Показываем уведомление
            alert(`Подключение к серверу ${serverIp}:${serverPort}\nSteam должен открыться автоматически.`);
        }
        
        async function acceptTicket(ticketId) {
            const token = localStorage.getItem('fearToken');
            if (!token) {
                alert('Токен не найден. Пожалуйста, войдите снова.');
                window.location.href = 'login.html';
                return;
            }
            
            try {
                // Пробуем разные варианты
                console.log('[Tickets] Trying to accept ticket:', ticketId);
                
                // Вариант 1: POST /reports/{id}/accept
                let response = await fetch(`/api/reports/${ticketId}/accept`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                // Если 404, пробуем PUT
                if (response.status === 404) {
                    console.log('[Tickets] POST failed, trying PUT...');
                    response = await fetch(`/api/reports/${ticketId}/accept`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Accept': 'application/json'
                        }
                    });
                }
                
                // Если все еще 404, пробуем PATCH
                if (response.status === 404) {
                    console.log('[Tickets] PUT failed, trying PATCH...');
                    response = await fetch(`/api/reports/${ticketId}/accept`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Accept': 'application/json'
                        }
                    });
                }
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('[Tickets] API Error:', response.status, errorText);
                    throw new Error(`HTTP error! status: ${response.status}, body: ${errorText}`);
                }
                
                console.log('[Tickets] Ticket accepted:', ticketId);
                
                // Редирект на страницу просмотра тикета
                window.location.href = `ticket-view.html?id=${ticketId}`;
                
            } catch (error) {
                console.error('[Tickets] Error accepting ticket:', error);
                alert(`Ошибка при принятии тикета: ${error.message}`);
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadTickets();
            loadProfileData();
        });
        
        async function loadProfileData() {
            const token = localStorage.getItem('fearToken');
            if (!token) {
                console.error('[Profile] No token found');
                return;
            }
            
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                const steamId = payload.client_id;
                
                if (!steamId) {
                    console.error('[Profile] No client_id in token');
                    return;
                }
                
                const response = await fetch(`/api/player?steamid=${steamId}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const profile = await response.json();
                    
                    const avatarEl = document.getElementById('profile-avatar');
                    const nameEl = document.getElementById('profile-name');
                    const roleEl = document.getElementById('profile-role');
                    
                    if (avatarEl && profile.avatar) {
                        avatarEl.src = profile.avatar;
                    }
                    
                    if (nameEl && profile.name) {
                        nameEl.textContent = profile.name;
                    }
                    
                    if (roleEl) {
                        const role = profile.adminGroup?.group_name || profile.role || 'Администратор';
                        roleEl.textContent = role;
                    }
                    
                    console.log('[Profile] Profile loaded successfully');
                } else {
                    console.error('[Profile] Failed to load profile:', response.status);
                }
            } catch (error) {
                console.error('[Profile] Error loading profile:', error);
            }
        }
    </script>
    </div> <!-- End main-content -->
    </div> <!-- End content-wrapper -->
