<head>

    <style>
        body {
            overflow-y: auto !important;
            overflow-x: hidden !important;
            height: auto !important;
            min-height: 100vh !important;
            background: #1a1d29;
        }
        
        .container {
            overflow-y: auto !important;
            overflow-x: hidden !important;
            height: auto !important;
            min-height: 100vh !important;
        }
        
        /* Animated Background */
        .animated-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .floating-dots {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(185, 28, 28, 0.6);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }
        
        .dot:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; animation-duration: 15s; }
        .dot:nth-child(2) { left: 20%; top: 80%; animation-delay: 2s; animation-duration: 18s; }
        .dot:nth-child(3) { left: 30%; top: 40%; animation-delay: 4s; animation-duration: 22s; }
        .dot:nth-child(4) { left: 40%; top: 60%; animation-delay: 1s; animation-duration: 20s; }
        .dot:nth-child(5) { left: 50%; top: 30%; animation-delay: 3s; animation-duration: 17s; }
        .dot:nth-child(6) { left: 60%; top: 70%; animation-delay: 5s; animation-duration: 19s; }
        .dot:nth-child(7) { left: 70%; top: 50%; animation-delay: 2.5s; animation-duration: 21s; }
        .dot:nth-child(8) { left: 80%; top: 25%; animation-delay: 4.5s; animation-duration: 16s; }
        .dot:nth-child(9) { left: 90%; top: 75%; animation-delay: 1.5s; animation-duration: 23s; }
        .dot:nth-child(10) { left: 15%; top: 55%; animation-delay: 3.5s; animation-duration: 18s; }
        
        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            25% {
                transform: translate(30px, -30px) scale(1.2);
                opacity: 0.6;
            }
            50% {
                transform: translate(-20px, 20px) scale(0.8);
                opacity: 0.4;
            }
            75% {
                transform: translate(20px, 30px) scale(1.1);
                opacity: 0.5;
            }
        }
        
        .red-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(185, 28, 28, 0.15) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.8;
            }
        }
        
        /* HEADER OVERRIDE */
        .header {
            background: rgba(10, 10, 15, 0.05) !important;
            padding: 1.5rem 2.5rem !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border: none !important;
            box-shadow: none !important;
        }
        
        .header::before {
            display: none !important;
        }

        .header-content {
            max-width: 1800px !important;
            margin: 0 auto !important;
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            gap: 3rem !important;
        }

        .logo-container {
            display: inline-block !important;
            position: relative !important;
            padding-left: 44px !important;
            font-size: 1.5rem !important;
            font-weight: 700 !important;
            color: white !important;
            line-height: 1 !important;
        }

        .logo-container img {
            position: absolute !important;
            left: 0 !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            width: 32px !important;
            height: 32px !important;
            border-radius: 8px !important;
            display: block !important;
        }

        .logo-text {
            background: linear-gradient(135deg, #dc2626 0%, #f87171 50%, #dc2626 100%) !important;
            background-size: 200% auto !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            background-clip: text !important;
            font-size: 1.5rem !important;
            font-weight: 700 !important;
            line-height: 1 !important;
            display: inline-block !important;
        }
        
        .back-btn {
            padding: 12px 24px;
            background: rgba(185, 28, 28, 0.2);
            border: 2px solid rgba(185, 28, 28, 0.4);
            border-radius: 10px;
            color: #dc2626;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;

        }
        
        .back-btn:hover {

            transform: translateY(-2px);
        }
        
        .russians-container {
            max-width: 1600px;

        .search-section {
            background: rgba(26, 26, 36, 0.8);

            border: 1px solid rgba(185, 28, 28, 0.2);
            border-radius: 24px;

        }

        .search-form {
            display: flex;
            gap: 16px;

        }

        .search-input {
            flex: 1;
            padding: 18px 24px;

            border: 2px solid rgba(185, 28, 28, 0.2);
            border-radius: 16px;

            font-size: 16px;

            transition: all 0.4s ease;
        }

        .search-input:focus {

        .search-button {

        .search-button:hover {

        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, rgba(185, 28, 28, 0.15) 0%, rgba(220, 38, 38, 0.1) 100%);

        .stat-box:hover {

        .stat-value {

            font-weight: 900;

            margin-bottom: 8px;
        }

        .stat-label {

            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .players-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 1200px) {
            .players-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .players-grid {
                grid-template-columns: 1fr;
            }
        }

        .player-card {
            background: rgba(26, 26, 36, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(185, 28, 28, 0.2);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .player-card::before {
            content: '';

            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #b91c1c, #dc2626);
        }

        .player-card:hover {
            border-color: #dc2626;
            box-shadow: 0 12px 30px rgba(185, 28, 28, 0.3);
            transform: translateY(-4px);
        }

        .player-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(185, 28, 28, 0.2);
        }

        .player-avatar {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            border: 3px solid #dc2626;
            box-shadow: 0 0 25px rgba(185, 28, 28, 0.4);
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-name {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .player-steamid {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Courier New', monospace;
        }

        .player-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(185, 28, 28, 0.2);
            flex-wrap: wrap;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border: 1px solid rgba(185, 28, 28, 0.3);
            border-radius: 8px;
            background: rgba(185, 28, 28, 0.1);
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            flex: 1;
            justify-content: center;

        }

        .action-btn:hover {
            background: rgba(185, 28, 28, 0.2);
            border-color: rgba(185, 28, 28, 0.5);
            transform: translateY(-1px);
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .spinner {
            display: inline-block;
            width: 56px;
            height: 56px;
            border: 4px solid rgba(185, 28, 28, 0.2);
            border-top-color: #dc2626;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-results {
            text-align: center;

            color: rgba(255, 255, 255, 0.5);
        }

        .no-results svg {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            opacity: 0.4;
            color: #dc2626;
        }
    </style>

<body>

    <script>
        const SESSION_KEY = 'fear_secret_access';
        
        // Проверка доступа
        function checkAccess() {
            const session = localStorage.getItem(SESSION_KEY);
            if (!session) {
                window.location.href = 'secret-login.html';
                return false;
            }
            
            try {
                const sessionData = JSON.parse(session);
                const now = Date.now();
                
                if (sessionData.expires <= now) {
                    localStorage.removeItem(SESSION_KEY);
                    window.location.href = 'secret-login.html';
                    return false;
                }
                
                return true;
            } catch (e) {
                localStorage.removeItem(SESSION_KEY);
                window.location.href = 'secret-login.html';
                return false;
            }
        }
        
        // Проверяем доступ при загрузке
        if (!checkAccess()) {
            throw new Error('Access denied');
        }
        
        let allPlayers = [];
        let russianPlayers = [];

        function hasRussianCharacters(text) {
            const cyrillicPattern = /[а-яА-ЯёЁ]/;
            return cyrillicPattern.test(text);
        }

        async function loadRussianPlayers() {
            const loading = document.getElementById('loading');
            const playersGrid = document.getElementById('playersGrid');
            const noResults = document.getElementById('noResults');

            loading.style.display = 'block';
            playersGrid.innerHTML = '';
            noResults.style.display = 'none';

            try {
                const response = await fetch('/api/fear?action=servers');
                const servers = await response.json();
                
                console.log('[Russians] Servers data:', servers);

                russianPlayers = [];
                let onlineServersCount = 0;
                let totalOnlineCount = 0;

                servers.forEach(server => {
                    if (server.live_data && server.live_data.players && Array.isArray(server.live_data.players)) {
                        const players = server.live_data.players;
                        totalOnlineCount += players.length;
                        
                        const russianPlayersOnServer = players.filter(player => 
                            hasRussianCharacters(player.nickname || '')
                        );

                        if (russianPlayersOnServer.length > 0) {
                            onlineServersCount++;
                        }

                        russianPlayersOnServer.forEach(player => {
                            russianPlayers.push({
                                name: player.nickname || 'Unknown',
                                steamId: player.steam_id || 'Unknown',
                                avatar: player.avatar || 'https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg',
                                server: server.site_name || server.domain || 'Unknown Server',
                                map: server.live_data.map_name || 'Unknown',
                                kills: player.kills || 0,
                                deaths: player.deaths || 0,
                                ping: player.ping || 0,
                                team: player.team || 'unknown',
                                serverIp: server.ip || '',
                                serverPort: server.port || ''
                            });
                        });
                    }
                });

                console.log(`[Russians] Found ${russianPlayers.length} Russian players`);

                document.getElementById('totalRussians').textContent = russianPlayers.length;
                document.getElementById('onlineServers').textContent = onlineServersCount;
                document.getElementById('totalOnline').textContent = totalOnlineCount;

                renderPlayers(russianPlayers);

            } catch (error) {
                console.error('[Russians] Error loading data:', error);
                noResults.style.display = 'block';
                noResults.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <p>Ошибка загрузки данных: ${error.message}</p>
                `;
            } finally {
                loading.style.display = 'none';
            }
        }

        function renderPlayers(players) {
            const playersGrid = document.getElementById('playersGrid');
            const noResults = document.getElementById('noResults');

            if (players.length === 0) {
                playersGrid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            
            playersGrid.innerHTML = players.map(player => {
                return `
                    <div class="player-card">
                        <div class="player-header">
                            <img src="${player.avatar}" 
                                 alt="${player.name}" 
                                 class="player-avatar"
                                 onerror="this.src='https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg'">
                            <div class="player-info">
                                <div class="player-name">${player.name}</div>
                                <div class="player-steamid">${player.steamId}</div>
                            </div>
                        </div>
                        
                        <div class="player-actions">
                            <button class="action-btn" onclick="window.location.href='steam://connect/${player.serverIp}:${player.serverPort}'">
                                ▶ Подключиться
                            </button>
                            <button class="action-btn" onclick="window.open('https://steamcommunity.com/profiles/${player.steamId}', '_blank')">
                                👤 Профиль
                            </button>
                            <button class="action-btn" onclick="copyToClipboard('${player.steamId}')">
                                📋 Копировать ID
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterPlayers(query) {
            const lowerQuery = query.toLowerCase();
            const filtered = russianPlayers.filter(player => {
                return player.name.toLowerCase().includes(lowerQuery) ||
                       player.steamId.includes(query) ||
                       player.server.toLowerCase().includes(lowerQuery);
            });
            
            renderPlayers(filtered);
            
            // Scroll to top when filtering
            const playersGrid = document.getElementById('playersGrid');
            if (playersGrid && playersGrid.parentElement) {
                playersGrid.parentElement.scrollTop = 0;
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showNotification('Steam ID скопирован в буфер обмена!');
            }).catch(err => {
                console.error('Ошибка копирования:', err);
            });
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, #b91c1c, #dc2626);
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                font-weight: 600;
                z-index: 10000;
                box-shadow: 0 4px 12px rgba(185, 28, 28, 0.3);
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;
            
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideIn {
                    from { transform: translateX(100%); opacity: 0; }
                    to { transform: translateX(0); opacity: 1; }
                }
            `;
            document.head.appendChild(style);
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => {
                    document.body.removeChild(notification);
                    document.head.removeChild(style);
                }, 300);
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (checkAccess()) {
                loadRussianPlayers();
                
                const searchInput = document.getElementById('searchInput');
                const searchButton = document.getElementById('searchButton');
                
                searchButton.addEventListener('click', () => {
                    const query = searchInput.value.trim();
                    if (query) {
                        filterPlayers(query);
                    } else {
                        renderPlayers(russianPlayers);
                    }
                });
                
                searchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const query = searchInput.value.trim();
                        if (query) {
                            filterPlayers(query);
                        } else {
                            renderPlayers(russianPlayers);
                        }
                    }
                });
            }
        });
        
        // Защита от инспектора
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
            }
        });
    </script>
    <script src="js/RoleAccessControl.js?v=4"></script>
    <script src="js/ButtonClickSound.js?v=1"></script>
</body>
</html>
