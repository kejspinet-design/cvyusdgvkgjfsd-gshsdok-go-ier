    <script>
        let currentStatus = 'all';
        let currentPage = 1;
        let allTickets = [];
        
        function switchTab(status) {
            currentStatus = status;
            currentPage = 1;
            
            // Обновляем активную вкладку
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            loadTickets();
        }
        
        async function loadTickets() {
            const token = localStorage.getItem('fearToken');
            if (!token) {
                console.error('[My Tickets] No token found, redirecting to login');
                window.location.href = 'login.html';
                return;
            }
            
            try {
                const response = await fetch(`/api/reports/history?page=${currentPage}&status=${currentStatus}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json',
                        'Cache-Control': 'no-cache'
                    }
                });
                
                if (!response.ok) {
                    if (response.status === 401) {
                        console.error('[My Tickets] Unauthorized, redirecting to login');
                        window.location.href = 'login.html';
                        return;
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('[My Tickets] Raw API response:', data);
                console.log('[My Tickets] Response type:', typeof data);
                console.log('[My Tickets] Is array?', Array.isArray(data));
                
                // Пробуем разные варианты структуры данных
                if (Array.isArray(data)) {
                    allTickets = data;
                } else if (data.tickets) {
                    allTickets = data.tickets;
                } else if (data.data) {
                    allTickets = Array.isArray(data.data) ? data.data : [];
                } else if (data.reports) {
                    allTickets = data.reports;
                } else {
                    allTickets = [];
                }
                
                console.log('[My Tickets] Parsed tickets:', allTickets);
                console.log('[My Tickets] Tickets count:', allTickets.length);
                
                renderTickets(allTickets);
                
            } catch (error) {
                console.error('[My Tickets] Error loading tickets:', error);
                document.getElementById('loading').innerHTML = '<div class="empty-state">Ошибка загрузки данных</div>';
            }
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function renderTickets(tickets) {
            console.log('[My Tickets] renderTickets called with:', tickets);
            console.log('[My Tickets] Tickets length:', tickets ? tickets.length : 'null/undefined');
            
            const loadingEl = document.getElementById('loading');
            const tableEl = document.getElementById('tickets-table');
            const rowsEl = document.getElementById('tickets-rows');
            const paginationEl = document.getElementById('pagination');
            
            if (!tickets || tickets.length === 0) {
                console.log('[My Tickets] No tickets to display');
                loadingEl.innerHTML = '<div class="empty-state">Нет тикетов</div>';
                loadingEl.style.display = 'block';
                tableEl.style.display = 'none';
                paginationEl.style.display = 'none';
                return;
            }
            
            console.log('[My Tickets] Rendering', tickets.length, 'tickets');
            loadingEl.style.display = 'none';
            tableEl.style.display = 'block';
            paginationEl.style.display = 'flex';
            rowsEl.innerHTML = '';
            
            // Показываем только первые 9 тикетов
            const limitedTickets = tickets.slice(0, 9);
            
            limitedTickets.forEach((ticket, index) => {
                console.log(`[My Tickets] Processing ticket ${index}:`, ticket);
                
                const avatarUrl = ticket.intruder_avatar || 'https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg';
                const playerName = ticket.intruder || 'Неизвестно';
                const reason = ticket.reason || 'Читы';
                const isClosed = ticket.result !== null && ticket.result !== undefined && ticket.result !== '';
                
                const row = document.createElement('div');
                row.className = 'table-row';
                row.onclick = () => window.location.href = `ticket-view.html?id=${ticket.id}`;
                
                row.innerHTML = `
                    <div class="date-cell">${formatDate(ticket.created_at)}</div>
                    <div class="player-cell">
                        <img src="${avatarUrl}" 
                             class="player-avatar"
                             onerror="this.src='https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg'">
                        <div class="player-name">${playerName}</div>
                    </div>
                    <div class="reason-cell">${reason}</div>
                    <div class="result-cell">
                        ${isClosed ? `
                            <div>${ticket.result}</div>
                            <div class="result-date">${formatDate(ticket.updated_at || ticket.created_at)}</div>
                        ` : '<div style="color: rgba(255, 255, 255, 0.4);">—</div>'}
                    </div>
                    <div class="status-cell">
                        <span class="status-badge ${isClosed ? 'status-closed' : 'status-open'}">
                            ${isClosed ? '✓ Закрыт' : 'Открыт'}
                        </span>
                    </div>
                `;
                
                rowsEl.appendChild(row);
            });
            
            console.log('[My Tickets] Finished rendering, rows added:', rowsEl.children.length);
            
            // Обновляем пагинацию
            const hasNextPage = tickets.length >= 20;
            document.getElementById('page-info').textContent = `Страница ${currentPage} (${tickets.length} тикетов)`;
            document.getElementById('prev-button').disabled = currentPage === 1;
            document.getElementById('next-button').disabled = !hasNextPage;
            
            console.log(`[My Tickets] Pagination: page=${currentPage}, tickets=${tickets.length}, hasNext=${hasNextPage}`);
        }
        
        function changePage(delta) {
            const oldPage = currentPage;
            currentPage += delta;
            if (currentPage < 1) {
                currentPage = 1;
                return;
            }
            
            console.log(`[My Tickets] Changing page from ${oldPage} to ${currentPage}`);
            loadTickets();
            
            // Scroll to top
            const containerContent = document.querySelector('.container-content');
            if (containerContent) {
                containerContent.scrollTop = 0;
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadTickets();
            loadProfileData();
        });
        
        async function loadProfileData() {
            const token = localStorage.getItem('fearToken');
            if (!token) {
                console.error('[Profile] No token found');
                return;
            }
            
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                const steamId = payload.client_id;
                
                if (!steamId) {
                    console.error('[Profile] No client_id in token');
                    return;
                }
                
                const response = await fetch(`/api/player?steamid=${steamId}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const profile = await response.json();
                    
                    const avatarEl = document.getElementById('profile-avatar');
                    const nameEl = document.getElementById('profile-name');
                    const roleEl = document.getElementById('profile-role');
                    
                    if (avatarEl && profile.avatar) {
                        avatarEl.src = profile.avatar;
                    }
                    
                    if (nameEl && profile.name) {
                        nameEl.textContent = profile.name;
                    }
                    
                    if (roleEl) {
                        const role = profile.adminGroup?.group_name || profile.role || 'Администратор';
                        roleEl.textContent = role;
                    }
                    
                    console.log('[Profile] Profile loaded successfully');
                } else {
                    console.error('[Profile] Failed to load profile:', response.status);
                }
            } catch (error) {
                console.error('[Profile] Error loading profile:', error);
            }
        }
    </script>
    </div> <!-- End main-content -->
    </div> <!-- End content-wrapper -->
    <script src="js/ButtonClickSound.js?v=1"></script>
</body>
</html>
