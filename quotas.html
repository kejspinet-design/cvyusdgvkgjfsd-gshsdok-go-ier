    <script>
        let userProfile = null;
        
        // Нормы по ролям
        const ROLE_QUOTAS = {
            'Мл. Модератор': { weekly: 20, monthly: 100 },
            'Модератор': { weekly: 25, monthly: 130 },
            'Ст. Модератор': { weekly: 0, monthly: 80 },
            'Ст. Админ': { weekly: 0, monthly: 50 }
        };
        
        document.addEventListener('DOMContentLoaded', () => {
            loadProfileData();
        });
        
        async function loadProfileData() {
            const token = localStorage.getItem('fearToken');
            if (!token) {
                console.error('[Profile] No token found');
                return;
            }
            
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                const steamId = payload.client_id;
                
                if (!steamId) {
                    console.error('[Profile] No client_id in token');
                    return;
                }
                
                const response = await fetch(`/api/player?steamid=${steamId}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const profile = await response.json();
                    userProfile = profile;
                    
                    // Отображаем норму по роли
                    await displayRoleQuota();
                    
                    console.log('[Profile] Profile loaded successfully');
                } else {
                    console.error('[Profile] Failed to load profile:', response.status);
                }
            } catch (error) {
                console.error('[Profile] Error loading profile:', error);
            }
        }
        
        async function displayRoleQuota() {
            if (!userProfile) return;
            
            const steamId = userProfile.steamid;
            const MAIN_ADMIN_STEAM_ID = '76561199524780327';
            const isMainAdmin = steamId === MAIN_ADMIN_STEAM_ID;
            
            const container = document.getElementById('role-quota-container');
            
            // Для главного админа показываем все нормы всех ролей
            if (isMainAdmin) {
                displayAllQuotas(container);
                return;
            }
            
            // Используем group_display_name для сопоставления с ROLE_QUOTAS
            const role = userProfile.adminGroup?.group_display_name || userProfile.adminGroup?.group_name || userProfile.role;
            const quota = ROLE_QUOTAS[role];
            
            console.log('[Quotas] User role:', role);
            console.log('[Quotas] Quota found:', quota);
            
            if (!quota) {
                container.innerHTML = `
                    <div class="quota-card">
                        <div class="quota-header">
                            <div class="quota-title">Для вашей роли нормы не установлены</div>
                            <span class="quota-role">${role}</span>
                        </div>
                        <p style="color: rgba(255, 255, 255, 0.6); font-size: 14px;">
                            У вас нет обязательных норм по наказаниям.
                        </p>
                    </div>
                `;
                return;
            }
            
            const token = localStorage.getItem('fearToken');
            if (!token) return;
            
            try {
                // Получаем баны пользователя
                const response = await fetch('/api/admin/punishments?type=0', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) return;
                
                const bans = await response.json();
                
                // Считаем баны за месяц
                const now = new Date();
                const monthAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
                
                const monthlyBans = bans.filter(ban => {
                    const banDate = new Date(ban.created * 1000);
                    return banDate >= monthAgo;
                }).length;
                
                // Определяем норму (берём месячную, если нет недельной)
                const yourQuota = quota.monthly;
                const progress = Math.min((monthlyBans / yourQuota) * 100, 100);
                
                container.innerHTML = `
                    <div class="quota-card">
                        <div class="quota-header">
                            <div class="quota-title">Ваша норма наказаний</div>
                            <span class="quota-role">${role}</span>
                        </div>
                        
                        <div class="quota-progress">
                            <div class="progress-info">
                                <span class="progress-current">Ваша норма: ${yourQuota} банов в месяц</span>
                            </div>
                        </div>
                        
                        <div class="quota-progress" style="margin-top: 20px;">
                            <div class="progress-info">
                                <span class="progress-current">Сделано: ${monthlyBans} банов</span>
                                <span class="progress-target">${progress.toFixed(1)}%</span>
                            </div>
                            <div class="progress-bar-container">
                                <div class="progress-bar" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        
                        <div class="quota-details">
                            <div class="detail-item">
                                <div class="detail-label">Ваша норма</div>
                                <div class="detail-value">${yourQuota}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Сделано</div>
                                <div class="detail-value">${monthlyBans}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Осталось</div>
                                <div class="detail-value">${Math.max(yourQuota - monthlyBans, 0)}</div>
                            </div>
                        </div>
                    </div>
                `;
                
            } catch (error) {
                console.error('[Quotas] Error displaying role quota:', error);
            }
        }
        
        // Функция для отображения всех норм (для главного админа)
        function displayAllQuotas(container) {
            const quotasHTML = Object.entries(ROLE_QUOTAS).map(([roleName, quota]) => `
                <div class="quota-card">
                    <div class="quota-header">
                        <div class="quota-title">${roleName}</div>
                        <span class="quota-role">Норма</span>
                    </div>
                    
                    <div class="quota-details">
                        <div class="detail-item">
                            <div class="detail-label">Неделя</div>
                            <div class="detail-value">${quota.weekly || '—'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Месяц</div>
                            <div class="detail-value" style="color: #667eea;">${quota.monthly}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Тип</div>
                            <div class="detail-value" style="font-size: 13px; color: rgba(255, 255, 255, 0.7);">Баны</div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = `
