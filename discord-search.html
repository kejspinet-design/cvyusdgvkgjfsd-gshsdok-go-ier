    <script>
        // Простой поиск без зависимости от BanGoalsNotifier
        let adminProfilesCache = [];
        let isCacheLoaded = false;
        
        // Загружаем профили при загрузке страницы
        document.addEventListener('DOMContentLoaded', async () => {
            const loadingEl = document.getElementById('loading');
            loadingEl.style.display = 'block';
            loadingEl.textContent = 'Загрузка профилей...';
            
            try {
                // Пробуем загрузить из localStorage
                const cachedData = localStorage.getItem('discordProfilesCache');
                if (cachedData) {
                    try {
                        adminProfilesCache = JSON.parse(cachedData);
                        isCacheLoaded = true;
                        loadingEl.style.display = 'none';
                        console.log('[Discord Search] ✓ Loaded from localStorage:', adminProfilesCache.length, 'profiles');
                        return;
                    } catch (e) {
                        console.error('[Discord Search] Error parsing cache:', e);
                    }
                }
                
                // Если нет в localStorage, загружаем с сервера
                const token = localStorage.getItem('fearToken');
                if (!token) {
                    showError('Необходима авторизация');
                    loadingEl.style.display = 'none';
                    return;
                }
                
                loadingEl.textContent = 'Загрузка профилей с сервера...';
                
                // Пробуем загрузить через /api/admins вместо /api/player-summaries
                const response = await fetch('/api/admins', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const admins = await response.json();
                
                // Загружаем полные профили для каждого админа
                loadingEl.textContent = `Загрузка профилей админов (0/${admins.length})...`;
                
                adminProfilesCache = [];
                const batchSize = 5;
                
                for (let i = 0; i < admins.length; i += batchSize) {
                    const batch = admins.slice(i, i + batchSize);
                    const promises = batch.map(admin => 
                        fetch(`/api/player?steamid=${admin.steamid}`, {
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Accept': 'application/json'
                            }
                        })
                        .then(res => res.ok ? res.json() : null)
                        .catch(() => null)
                    );
                    
                    const profiles = await Promise.all(promises);
                    adminProfilesCache.push(...profiles.filter(p => p !== null));
                    
                    loadingEl.textContent = `Загрузка профилей админов (${adminProfilesCache.length}/${admins.length})...`;
                }
                
                isCacheLoaded = true;
                
                // Сохраняем в localStorage
                try {
                    localStorage.setItem('discordProfilesCache', JSON.stringify(adminProfilesCache));
                } catch (e) {
                    console.warn('[Discord Search] Could not save to localStorage:', e);
                }
                
                loadingEl.style.display = 'none';
                console.log('[Discord Search] ✓ Loaded from server:', adminProfilesCache.length, 'profiles');
                
            } catch (error) {
                console.error('[Discord Search] Error loading profiles:', error);
                showError(`Ошибка загрузки профилей: ${error.message}`);
                loadingEl.style.display = 'none';
            }
        });
        
        // Поиск по Enter
        document.getElementById('discord-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchByDiscord();
            }
        });
        
        async function searchByDiscord() {
            const discordInput = document.getElementById('discord-input').value.trim();
            
            if (!discordInput) {
                showError('Пожалуйста, введите Discord username');
                return;
            }
            
            // Убираем @ если он есть в начале
            const cleanDiscord = discordInput.startsWith('@') ? discordInput.substring(1) : discordInput;
            
            if (!isCacheLoaded) {
                showError('Профили ещё загружаются, подождите...');
                return;
            }
            
            if (adminProfilesCache.length === 0) {
                showError('Кэш профилей пуст. Попробуйте обновить страницу.');
                return;
            }
            
            const button = document.getElementById('search-button');
            const loading = document.getElementById('loading');
            const resultsContainer = document.getElementById('results-container');
            const errorMessage = document.getElementById('error-message');
            
            button.disabled = true;
            button.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle; margin-right: 5px;"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>Поиск...';
            loading.style.display = 'block';
            resultsContainer.style.display = 'none';
            errorMessage.style.display = 'none';
            
            try {
                console.log('[Discord Search] Searching in', adminProfilesCache.length, 'profiles for:', cleanDiscord);
                
                // Ищем в кэше (проверяем разные поля)
                const matchedProfiles = adminProfilesCache.filter(profile => {
                    // Проверяем все возможные поля с Discord
                    const discordFields = [
                        profile.discordNickname,  // ← ОСНОВНОЕ ПОЛЕ!
                        profile.discord,
                        profile.discord_username,
                        profile.discordUsername,
                        profile.discord_name,
                        profile.discordName,
                        profile.discord_tag,
                        profile.discordTag,
                        profile.discord_id,
                        profile.discordId
                    ];
                    
                    // Ищем совпадение хотя бы в одном поле
                    return discordFields.some(field => {
                        if (!field) return false;
                        const fieldStr = String(field).toLowerCase();
                        const searchStr = cleanDiscord.toLowerCase();
                        return fieldStr.includes(searchStr);
                    });
                });
                
                console.log('[Discord Search] Found matches:', matchedProfiles.length);
                
                if (matchedProfiles.length === 0) {
                    showError(`Админы с Discord "${cleanDiscord}" не найдены. Всего профилей в кэше: ${adminProfilesCache.length}`);
                    return;
                }
                
                displayResults(matchedProfiles);
                
            } catch (error) {
                console.error('[Discord Search] Error:', error);
                showError(`Ошибка поиска: ${error.message}`);
            } finally {
                button.disabled = false;
                button.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle; margin-right: 5px;"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>Найти';
                loading.style.display = 'none';
            }
        }
        
        function displayResults(results) {
            const resultsContainer = document.getElementById('results-container');
            const resultsGrid = document.getElementById('results-grid');
            const resultsCount = document.getElementById('results-count');
            
            if (!results || results.length === 0) {
                showError('Аккаунты не найдены');
                return;
            }
            
            resultsCount.textContent = `Найдено: ${results.length}`;
            resultsGrid.innerHTML = '';
            
            results.forEach(player => {
                const card = document.createElement('div');
                card.className = 'player-card';
                // Убрали onclick с карточки, теперь только кнопка работает
                
                // Ищем Discord в разных полях
                const discord = player.discordNickname ||  // ← ОСНОВНОЕ ПОЛЕ!
                               player.discord || 
                               player.discord_username || 
                               player.discordUsername || 
                               player.discord_name ||
                               player.discordName ||
                               player.discord_tag ||
                               player.discordTag ||
                               'Не указан';
                               
                const steamId = player.steamid || player.steam_id || 'N/A';
                const name = player.name || player.nickname || 'Неизвестно';
                const avatar = player.avatar || 'https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg';
                
                card.innerHTML = `
                    <div class="player-header">
                        <img src="${avatar}" 
                             class="player-avatar"
                             onerror="this.src='https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg'">
                        <div class="player-info">
                            <div class="player-name">${name}</div>
                            <div class="player-discord">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.956-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.946 2.418-2.157 2.418z"/>
                                </svg>
                                ${discord}
                            </div>
                        </div>
                    </div>
                    <button class="profile-button" onclick="event.stopPropagation(); window.open('https://fearproject.ru/profile/${steamId}', '_blank');" style="width: 100%; margin-top: 15px; padding: 10px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 8px; color: white; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 12px rgba(102, 126, 234, 0.4)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px;">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        Перейти к профилю
                    </button>
                `;
                
                resultsGrid.appendChild(card);
            });
            
            resultsContainer.style.display = 'block';
        }
        
        function showError(message) {
            const errorMessage = document.getElementById('error-message');
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            // Проверка авторизации
            const token = localStorage.getItem('fearToken');
            if (!token) {
                window.location.href = 'login.html';
            }
            
            loadProfileData();
        });
        
        async function loadProfileData() {
            const token = localStorage.getItem('fearToken');
            if (!token) {
                console.error('[Profile] No token found');
                return;
            }
            
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                const steamId = payload.client_id;
                
                if (!steamId) {
                    console.error('[Profile] No client_id in token');
                    return;
                }
                
                const response = await fetch(`/api/player?steamid=${steamId}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const profile = await response.json();
                    
                    const avatarEl = document.getElementById('profile-avatar');
                    const nameEl = document.getElementById('profile-name');
                    const roleEl = document.getElementById('profile-role');
                    
                    if (avatarEl && profile.avatar) {
                        avatarEl.src = profile.avatar;
                    }
                    
                    if (nameEl && profile.name) {
                        nameEl.textContent = profile.name;
                    }
                    
                    if (roleEl) {
                        const role = profile.adminGroup?.group_name || profile.role || 'Администратор';
                        roleEl.textContent = role;
                    }
                    
                    console.log('[Profile] Profile loaded successfully');
                } else {
                    console.error('[Profile] Failed to load profile:', response.status);
                }
            } catch (error) {
                console.error('[Profile] Error loading profile:', error);
            }
        }
    </script>
    <script src="js/ButtonClickSound.js?v=1"></script>
</body>
