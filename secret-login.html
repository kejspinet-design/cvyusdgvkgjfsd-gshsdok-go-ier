<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Fear Protection</title>
    <link rel="icon" href="./9574.ico" type="image/x-icon">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/ultra-premium-v2.css?v=3">
    <link rel="stylesheet" href="css/style.css?v=3">
    <link rel="stylesheet" href="css/dashboard.css?v=3">
    
    <style>
        body {
            overflow-y: auto !important;
            overflow-x: hidden !important;
            height: auto !important;
            min-height: 100vh !important;
            background: #1a1d29;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Animated Background */
        .animated-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .floating-dots {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(185, 28, 28, 0.6);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }
        
        .dot:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; animation-duration: 15s; }
        .dot:nth-child(2) { left: 20%; top: 80%; animation-delay: 2s; animation-duration: 18s; }
        .dot:nth-child(3) { left: 30%; top: 40%; animation-delay: 4s; animation-duration: 22s; }
        .dot:nth-child(4) { left: 40%; top: 60%; animation-delay: 1s; animation-duration: 20s; }
        .dot:nth-child(5) { left: 50%; top: 30%; animation-delay: 3s; animation-duration: 17s; }
        .dot:nth-child(6) { left: 60%; top: 70%; animation-delay: 5s; animation-duration: 19s; }
        .dot:nth-child(7) { left: 70%; top: 50%; animation-delay: 2.5s; animation-duration: 21s; }
        .dot:nth-child(8) { left: 80%; top: 25%; animation-delay: 4.5s; animation-duration: 16s; }
        .dot:nth-child(9) { left: 90%; top: 75%; animation-delay: 1.5s; animation-duration: 23s; }
        .dot:nth-child(10) { left: 15%; top: 55%; animation-delay: 3.5s; animation-duration: 18s; }
        
        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            25% {
                transform: translate(30px, -30px) scale(1.2);
                opacity: 0.6;
            }
            50% {
                transform: translate(-20px, 20px) scale(0.8);
                opacity: 0.4;
            }
            75% {
                transform: translate(20px, 30px) scale(1.1);
                opacity: 0.5;
            }
        }
        
        .red-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(185, 28, 28, 0.15) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.8;
            }
        }
        
        .login-container {
            position: relative;
            z-index: 1;
            max-width: 450px;
            width: 90%;
            background: rgba(37, 40, 54, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(185, 28, 28, 0.3);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(185, 28, 28, 0.5);
        }
        
        .login-title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #dc2626 0%, #f87171 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .form-input {
            padding: 16px 20px;
            background: rgba(26, 29, 41, 0.9);
            border: 2px solid rgba(185, 28, 28, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 0 4px rgba(185, 28, 28, 0.2);
        }
        
        .login-button {
            padding: 16px;
            background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(185, 28, 28, 0.4);
            margin-top: 10px;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(185, 28, 28, 0.6);
        }
        
        .login-button:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 8px;
            padding: 12px 16px;
            color: #ef4444;
            font-size: 14px;
            font-weight: 600;
            display: none;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        
        .back-link a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        
        .back-link a:hover {
            color: #dc2626;
        }
    </style>
</head>
<body>
    <!-- АНИМИРОВАННЫЙ ФОН -->
    <div class="animated-background">
        <div class="floating-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="red-glow"></div>
    </div>
    
    <!-- Login Container -->
    <div class="login-container">
        <div class="login-header">
            <img src="./9574.ico" alt="Fear Protection" class="login-logo">
            <h1 class="login-title">Секретное меню</h1>
            <p class="login-subtitle">Введите пароль для доступа</p>
        </div>
        
        <form class="login-form" id="loginForm">
            <div class="error-message" id="errorMessage">
                Неверный пароль!
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Пароль</label>
                <input 
                    type="password" 
                    id="password" 
                    class="form-input" 
                    placeholder="Введите пароль..."
                    autocomplete="off"
                    required
                >
            </div>
            
            <button type="submit" class="login-button">Войти</button>
        </form>
        
        <div class="back-link">
            <a href="anticheat.html">← Вернуться на главную</a>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = '53452663';
        const SESSION_KEY = 'fear_secret_access';
        const SESSION_DURATION = 3600000; // 1 час в миллисекундах
        
        // Проверка существующей сессии
        function checkExistingSession() {
            const session = localStorage.getItem(SESSION_KEY);
            if (session) {
                try {
                    const sessionData = JSON.parse(session);
                    const now = Date.now();
                    
                    // Проверяем не истекла ли сессия
                    if (sessionData.expires > now) {
                        // Сессия действительна, перенаправляем в меню
                        window.location.href = 'secret-menu.html';
                        return true;
                    } else {
                        // Сессия истекла, удаляем
                        localStorage.removeItem(SESSION_KEY);
                    }
                } catch (e) {
                    localStorage.removeItem(SESSION_KEY);
                }
            }
            return false;
        }
        
        // Создание сессии
        function createSession() {
            const sessionData = {
                authenticated: true,
                expires: Date.now() + SESSION_DURATION,
                timestamp: Date.now()
            };
            localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
        }
        
        // Обработка формы
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            if (password === CORRECT_PASSWORD) {
                // Создаем сессию
                createSession();
                
                // Перенаправляем в секретное меню
                window.location.href = 'secret-menu.html';
            } else {
                // Показываем ошибку
                errorMessage.style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
                
                // Скрываем ошибку через 3 секунды
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 3000);
            }
        });
        
        // Проверяем сессию при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            checkExistingSession();
            document.getElementById('password').focus();
        });
        
        // Защита от инспектора
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
            }
        });
    </script>
    <script src="js/RoleAccessControl.js?v=4"></script>
    <script src="js/ButtonClickSound.js?v=1"></script>
</body>
</html>
