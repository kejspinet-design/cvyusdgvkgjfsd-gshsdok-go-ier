    <style>
        body {
            overflow-y: auto !important;
            overflow-x: hidden !important;
            height: auto !important;
            min-height: 100vh !important;
            background: #1a1d29;
        }
        
        .container {
            overflow-y: auto !important;
            overflow-x: hidden !important;
            height: auto !important;
            min-height: 100vh !important;
        }
        
        /* Animated Background */
        .animated-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .floating-dots {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(185, 28, 28, 0.6);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }
        
        .dot:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; animation-duration: 15s; }
        .dot:nth-child(2) { left: 20%; top: 80%; animation-delay: 2s; animation-duration: 18s; }
        .dot:nth-child(3) { left: 30%; top: 40%; animation-delay: 4s; animation-duration: 22s; }
        .dot:nth-child(4) { left: 40%; top: 60%; animation-delay: 1s; animation-duration: 20s; }
        .dot:nth-child(5) { left: 50%; top: 30%; animation-delay: 3s; animation-duration: 17s; }
        .dot:nth-child(6) { left: 60%; top: 70%; animation-delay: 5s; animation-duration: 19s; }
        .dot:nth-child(7) { left: 70%; top: 50%; animation-delay: 2.5s; animation-duration: 21s; }
        .dot:nth-child(8) { left: 80%; top: 25%; animation-delay: 4.5s; animation-duration: 16s; }
        .dot:nth-child(9) { left: 90%; top: 75%; animation-delay: 1.5s; animation-duration: 23s; }
        .dot:nth-child(10) { left: 15%; top: 55%; animation-delay: 3.5s; animation-duration: 18s; }
        
        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            25% {
                transform: translate(30px, -30px) scale(1.2);
                opacity: 0.6;
            }
            50% {
                transform: translate(-20px, 20px) scale(0.8);
                opacity: 0.4;
            }
            75% {
                transform: translate(20px, 30px) scale(1.1);
                opacity: 0.5;
            }
        }
        
        .red-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(185, 28, 28, 0.15) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.8;
            }
        }
        
        /* HEADER OVERRIDE */
        .header {
            background: rgba(10, 10, 15, 0.05) !important;
            padding: 1.5rem 2.5rem !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border: none !important;
            box-shadow: none !important;
            position: relative !important;
            z-index: 100 !important;
        }
        
        .header::before {
            display: none !important;
        }

        .header-content {
            max-width: 1800px !important;
            margin: 0 auto !important;
            display: grid !important;
            grid-template-columns: auto 1fr auto !important;
            align-items: center !important;
            gap: 20px !important;
        }

        .logo-container {
            display: inline-block !important;
            position: relative !important;
            padding-left: 44px !important;
            font-size: 1.5rem !important;
            font-weight: 700 !important;
            color: white !important;
            line-height: 1 !important;
        }

        .logo-container img {
            position: absolute !important;
            left: 0 !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            width: 32px !important;
            height: 32px !important;
            border-radius: 8px !important;
            display: block !important;
        }

        .logo-text {
            background: linear-gradient(135deg, #dc2626 0%, #f87171 50%, #dc2626 100%) !important;
            background-size: 200% auto !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            background-clip: text !important;
            font-size: 1.5rem !important;
            font-weight: 700 !important;
            line-height: 1 !important;
            display: inline-block !important;
        }
        
        /* Navigation buttons hover effects */
        nav a {
            position: relative;
            z-index: 10;
        }
        
        nav a:hover:not([href*="discord"]):not([style*="linear-gradient"]) {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
            transform: translateY(-2px);
        }
        
        /* Profile button hover */
        .profile-button:hover {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
            transform: translateY(-2px);
        }
        
        .back-btn {
            padding: 12px 24px;
            background: rgba(185, 28, 28, 0.2);
            border: 2px solid rgba(185, 28, 28, 0.4);
            border-radius: 10px;
            color: #dc2626;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .back-btn:hover {
            background: rgba(185, 28, 28, 0.3);
            border-color: rgba(185, 28, 28, 0.6);
            transform: translateY(-2px);
        }
        
        .admins-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .server-admins-section {
            background: rgba(26, 26, 36, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(185, 28, 28, 0.2);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 24px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .server-admins-section:hover {
            border-color: rgba(185, 28, 28, 0.4);
            box-shadow: 0 12px 30px rgba(185, 28, 28, 0.2);
            transform: translateY(-2px);
        }

        .server-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(185, 28, 28, 0.3);
        }

        .server-name {
            font-size: 20px;
            font-weight: 700;
            color: #f87171;
            text-shadow: 0 0 20px rgba(185, 28, 28, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .server-name::before {
            content: '🖥';
            font-size: 16px;
            color: #dc2626;
        }

        .server-info {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
        }

        .server-info span {
            background: rgba(185, 28, 28, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(185, 28, 28, 0.2);
        }

        .admin-count {
            background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(185, 28, 28, 0.4);
        }

        .admins-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        @media (max-width: 768px) {
            .admins-list {
                grid-template-columns: 1fr;
            }
        }

        .admin-card {
            background: linear-gradient(135deg, rgba(26, 26, 36, 0.8) 0%, rgba(18, 18, 26, 0.8) 100%);
            border: 1px solid rgba(185, 28, 28, 0.2);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            gap: 14px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .admin-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #b91c1c, #dc2626);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .admin-card:hover {
            border-color: #dc2626;
            background: linear-gradient(135deg, rgba(185, 28, 28, 0.1) 0%, rgba(26, 26, 36, 0.9) 100%);
            box-shadow: 0 8px 24px rgba(185, 28, 28, 0.2);
            transform: translateY(-2px);
        }

        .admin-card:hover::before {
            opacity: 1;
        }

        .admin-avatar {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid #dc2626;
            box-shadow: 0 0 20px rgba(185, 28, 28, 0.3);
            transition: all 0.3s ease;
        }

        .admin-card:hover .admin-avatar {
            box-shadow: 0 0 30px rgba(185, 28, 28, 0.5);
            transform: scale(1.05);
        }

        .admin-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .admin-name {
            font-weight: 700;
            color: white;
            word-break: break-word;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .admin-stats {
            display: flex;
            gap: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(185, 28, 28, 0.15);
            padding: 4px 10px;
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(185, 28, 28, 0.2);
            transition: all 0.2s ease;
        }

        .stat:hover {
            background: rgba(185, 28, 28, 0.25);
            border-color: rgba(185, 28, 28, 0.4);
        }

        .team-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .team-ct {
            background: linear-gradient(135deg, rgba(0, 150, 255, 0.3), rgba(0, 150, 255, 0.2));
            color: #0096ff;
            border: 1px solid rgba(0, 150, 255, 0.4);
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.2);
        }

        .team-t {
            background: linear-gradient(135deg, rgba(255, 150, 0, 0.3), rgba(255, 150, 0, 0.2));
            color: #ff9600;
            border: 1px solid rgba(255, 150, 0, 0.4);
            box-shadow: 0 0 10px rgba(255, 150, 0, 0.2);
        }

        .admin-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .admin-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .admin-btn-primary {
            background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(185, 28, 28, 0.3);
        }

        .admin-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(185, 28, 28, 0.5);
        }

        .admin-btn-secondary {
            background: rgba(26, 26, 36, 0.8);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(185, 28, 28, 0.2);
        }

        .admin-btn-secondary:hover {
            background: rgba(185, 28, 28, 0.1);
            border-color: #dc2626;
            color: #dc2626;
            transform: translateY(-1px);
        }

        .no-admins {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
        }

        .header-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(26, 26, 36, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(185, 28, 28, 0.2);
            border-radius: 16px;
            padding: 20px 28px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            flex: 1;
            min-width: 150px;
        }

        .stat-card:hover {
            border-color: rgba(185, 28, 28, 0.4);
            box-shadow: 0 12px 30px rgba(185, 28, 28, 0.2);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #b91c1c 0%, #f87171 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: rgba(255, 255, 255, 0.6);
        }

        .spinner {
            display: inline-block;
            width: 48px;
            height: 48px;
            border: 4px solid rgba(185, 28, 28, 0.2);
            border-top-color: #dc2626;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(185, 28, 28, 0.3);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

                <!-- Loading -->
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Загрузка...</p>
                </div>

                <!-- Admins List -->
                <div id="adminsList"></div>
            </div>
        </main>
    </div>

    <script>
        let allServersData = [];

        async function loadAdmins() {
            try {
                console.log('[Admins] Fetching servers...');
                const response = await fetch('/api/fear?action=servers');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('[Admins] Raw response:', data);
                
                let servers = [];
                if (Array.isArray(data)) {
                    servers = data;
                } else if (data.servers && Array.isArray(data.servers)) {
                    servers = data.servers;
                } else if (data.data && Array.isArray(data.data)) {
                    servers = data.data;
                }
                
                console.log('[Admins] Parsed servers:', servers.length);
                
                allServersData = servers;
                renderAdmins(servers);

            } catch (error) {
                console.error('[Admins] Error loading admins:', error);
                document.getElementById('loading').innerHTML = '<p style="color: #ff6b6b;">Ошибка загрузки: ' + error.message + '</p>';
            }
        }

        function renderAdmins(servers, searchQuery = '') {
            let totalAdmins = 0;
            let serversWithAdmins = 0;
            const adminsList = document.getElementById('adminsList');
            adminsList.innerHTML = '';
            
            const serversWithAdminsList = servers.filter(server => {
                const admins = getAdminsFromServer(server, searchQuery);
                if (admins.length > 0) {
                    serversWithAdmins++;
                    totalAdmins += admins.length;
                    return true;
                }
                return false;
            });

            console.log('[Admins] Total admins found:', totalAdmins);

            document.getElementById('totalServers').textContent = servers.length;
            document.getElementById('totalAdmins').textContent = totalAdmins;
            document.getElementById('serversWithAdmins').textContent = serversWithAdmins;

            document.getElementById('loading').style.display = 'none';

            if (serversWithAdminsList.length === 0) {
                adminsList.innerHTML = '<div class="no-admins">' + 
                    (searchQuery ? `Админов не найдено по запросу "${searchQuery}"` : 'Админов не найдено') + 
                    '</div>';
                return;
            }

            serversWithAdminsList.forEach(server => {
                const admins = getAdminsFromServer(server, searchQuery);
                const serverSection = createServerSection(server, admins);
                adminsList.appendChild(serverSection);
            });
        }

        function getAdminsFromServer(server, searchQuery = '') {
            const players = server.live_data?.players || [];
            let admins = players.filter(player => player.is_admin === true || player.is_admin === 'True');
            
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                admins = admins.filter(admin => {
                    const nickname = (admin.nickname || '').toLowerCase();
                    return nickname.includes(query);
                });
            }
            
            return admins;
        }

        function createServerSection(server, admins) {
            const section = document.createElement('div');
            section.className = 'server-admins-section';

            const serverName = server.site_name || server.name || 'Unknown Server';
            const serverType = server.type || 'N/A';
            const mapName = server.live_data?.map_name || server.map || 'N/A';
            const currentPlayers = server.live_data?.current_players || 0;
            const maxPlayers = server.live_data?.max_players || 0;

            const header = document.createElement('div');
            header.className = 'server-header';
            header.innerHTML = `
                <div>
                    <div class="server-name">${serverName}</div>
                    <div class="server-info">
                        <span>Тип: ${serverType}</span>
                        <span>Карта: ${mapName}</span>
                        <span>Игроки: ${currentPlayers}/${maxPlayers}</span>
                    </div>
                </div>
                <div class="admin-count">${admins.length} ${admins.length === 1 ? 'админ' : 'админов'}</div>
            `;
            section.appendChild(header);

            const adminsList = document.createElement('div');
            adminsList.className = 'admins-list';

            admins.forEach(admin => {
                const adminCard = document.createElement('div');
                adminCard.className = 'admin-card';
                
                const defaultAvatar = 'https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg';
                const avatarUrl = admin.avatar || defaultAvatar;
                const nickname = admin.nickname || 'Unknown';
                const steamId = admin.steam_id || 'unknown';
                const team = admin.team || 'unknown';
                const teamClass = team === 'ct' ? 'team-ct' : 'team-t';
                const teamLabel = team === 'ct' ? 'CT' : 'T';
                const kills = admin.kills || 0;
                const deaths = admin.deaths || 0;
                const ping = admin.ping || 0;
                
                const serverIp = server.ip || '';
                const serverPort = server.port || '';
                
                adminCard.innerHTML = `
                    <img src="${avatarUrl}" alt="${nickname}" class="admin-avatar" onerror="this.src='${defaultAvatar}'">
                    <div class="admin-info">
                        <div class="admin-name">${nickname}</div>
                        <div class="admin-stats">
                            <span class="team-badge ${teamClass}">
                                ${teamLabel}
                            </span>
                            <span class="stat">
                                <span>К/Д</span>
                                <span>${kills}/${deaths}</span>
                            </span>
                            <span class="stat">
                                <span>Пинг</span>
                                <span>${ping}ms</span>
                            </span>
                        </div>
                        <div class="admin-actions">
                            <button class="admin-btn admin-btn-primary" onclick="window.location.href='steam://connect/${serverIp}:${serverPort}'">
                                <span>▶</span>
                                <span>Подключиться</span>
                            </button>
                            <button class="admin-btn admin-btn-secondary" onclick="window.open('https://fearproject.ru/profile/${steamId}', '_blank')">
                                <span>👤</span>
                                <span>Профиль Fear</span>
                            </button>
                            <button class="admin-btn admin-btn-secondary" onclick="window.open('https://steamcommunity.com/profiles/${steamId}', '_blank')">
                                <span>🎮</span>
                                <span>Steam</span>
                            </button>
                        </div>
                    </div>
                `;
                adminsList.appendChild(adminCard);
            });

            section.appendChild(adminsList);
            return section;
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadAdmins();
        });
        
        // Защита от инспектора
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
            }
        });
    </script>
    <script src="js/RoleAccessControl.js?v=4"></script>
    <script src="js/ButtonClickSound.js?v=1"></script>
</body>
</html>
