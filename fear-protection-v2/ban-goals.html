    <script>
        let currentGoal = null;
        let userProfile = null;
        
        // Нормы по ролям
        const ROLE_QUOTAS = {
            'Мл. Модератор': { weekly: 20, monthly: 100 },
            'Модератор': { weekly: 25, monthly: 130 },
            'Ст. Модератор': { weekly: 0, monthly: 80 },
            'Ст. Админ': { weekly: 0, monthly: 50 }
        };
        
        document.addEventListener('DOMContentLoaded', () => {
            loadGoal();
            loadProfileData();
            
            // Проверяем прогресс каждые 30 секунд
            setInterval(checkGoalProgress, 30000);
        });
        
        async function loadProfileData() {
            const token = localStorage.getItem('fearToken');
            if (!token) {
                console.error('[Profile] No token found');
                return;
            }
            
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                const steamId = payload.client_id;
                
                if (!steamId) {
                    console.error('[Profile] No client_id in token');
                    return;
                }
                
                const response = await fetch(`/api/player?steamid=${steamId}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const profile = await response.json();
                    userProfile = profile;
                    
                    const avatarEl = document.getElementById('profile-avatar');
                    const nameEl = document.getElementById('profile-name');
                    const roleEl = document.getElementById('profile-role');
                    
                    if (avatarEl && profile.avatar) {
                        avatarEl.src = profile.avatar;
                    }
                    
                    if (nameEl && profile.name) {
                        nameEl.textContent = profile.name;
                    }
                    
                    if (roleEl) {
                        const role = profile.adminGroup?.group_name || profile.role || 'Администратор';
                        roleEl.textContent = role;
                    }
                    
                    // Проверяем прогресс
                    await checkGoalProgress();
                    
                    console.log('[Profile] Profile loaded successfully');
                } else {
                    console.error('[Profile] Failed to load profile:', response.status);
                }
            } catch (error) {
                console.error('[Profile] Error loading profile:', error);
            }
        }
        
        
        function loadGoal() {
            const savedGoal = localStorage.getItem('banGoal');
            if (savedGoal) {
                currentGoal = JSON.parse(savedGoal);
                displayGoal();
            }
        }
        
        function saveGoal() {
            localStorage.setItem('banGoal', JSON.stringify(currentGoal));
        }
        
        function deleteGoal() {
            if (!confirm('Вы уверены, что хотите удалить текущую цель?')) {
                return;
            }
            
            currentGoal = null;
            localStorage.removeItem('banGoal');
            
            document.getElementById('active-goal-container').innerHTML = '<div class="empty-state">Нет активной цели</div>';
            document.getElementById('create-goal-section').style.display = 'block';
            
            console.log('[Ban Goals] Goal deleted');
        }
        
        async function createGoal() {
            const count = parseInt(document.getElementById('goal-count').value);
            const period = parseInt(document.getElementById('goal-period').value);
            
            if (!count || count < 1) {
                alert('Пожалуйста, введите корректное количество банов');
                return;
            }
            
            currentGoal = {
                targetCount: count,
                periodDays: period,
                startDate: new Date().toISOString(),
                endDate: new Date(Date.now() + period * 24 * 60 * 60 * 1000).toISOString(),
                currentCount: 0,
                status: 'active'
            };
            
            saveGoal();
            displayGoal();
            await checkGoalProgress();
            
            // Очищаем форму
            document.getElementById('goal-count').value = '';
        }
        
        function displayGoal() {
            const container = document.getElementById('active-goal-container');
            
            if (!currentGoal) {
                container.innerHTML = '<div class="empty-state">Нет активной цели. Создайте новую цель ниже.</div>';
                return;
            }
            
            const progress = Math.min((currentGoal.currentCount / currentGoal.targetCount) * 100, 100);
            const remaining = Math.max(currentGoal.targetCount - currentGoal.currentCount, 0);
            const daysLeft = Math.ceil((new Date(currentGoal.endDate) - new Date()) / (1000 * 60 * 60 * 24));
            
            let statusClass = 'active';
            let statusText = 'Активна';
            
            if (currentGoal.status === 'completed') {
                statusClass = 'completed';
                statusText = '✓ Выполнена';
            } else if (currentGoal.status === 'failed') {
                statusClass = 'failed';
                statusText = '✗ Не выполнена';
            } else if (daysLeft < 0) {
                statusClass = 'failed';
                statusText = '✗ Время истекло';
            }
            
            container.innerHTML = `
                <div class="goal-card">
                    <div class="goal-header">
                        <div class="goal-title">Текущая цель</div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span class="goal-status ${statusClass}">${statusText}</span>
                            <button onclick="deleteGoal()" style="background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #ef4444; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.3s ease;" onmouseover="this.style.background='rgba(239, 68, 68, 0.3)'" onmouseout="this.style.background='rgba(239, 68, 68, 0.2)'">
                                Удалить цель
                            </button>
                        </div>
                    </div>
                    
                    <div class="goal-progress">
                        <div class="progress-info">
                            <span class="progress-current">${currentGoal.currentCount} / ${currentGoal.targetCount} банов</span>
                            <span class="progress-target">${progress.toFixed(1)}%</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    
                    <div class="goal-details">
                        <div class="detail-item">
                            <div class="detail-label">Осталось банов</div>
                            <div class="detail-value">${remaining}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Дней осталось</div>
                            <div class="detail-value">${Math.max(daysLeft, 0)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Период</div>
                            <div class="detail-value">${currentGoal.periodDays} дней</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        async function checkGoalProgress() {
            if (!currentGoal || currentGoal.status !== 'active') {
                return;
            }
            
            const token = localStorage.getItem('fearToken');
            if (!token) {
                return;
            }
            
            try {
                // Получаем баны пользователя
                const response = await fetch('/api/admin/punishments?type=0', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    return;
                }
                
                const bans = await response.json();
                
                // Считаем баны с момента начала цели
                const startDate = new Date(currentGoal.startDate);
                const bansInPeriod = bans.filter(ban => {
                    const banDate = new Date(ban.created * 1000);
                    return banDate >= startDate;
                });
                
                const oldCount = currentGoal.currentCount;
                currentGoal.currentCount = bansInPeriod.length;
                
                // Проверяем, достигнута ли цель
                if (currentGoal.currentCount >= currentGoal.targetCount) {
                    currentGoal.status = 'completed';
                    showNotification('🎉 Цель выполнена!', `Вы достигли цели: ${currentGoal.targetCount} банов за ${currentGoal.periodDays} дней!`);
                } else if (new Date() > new Date(currentGoal.endDate)) {
                    currentGoal.status = 'failed';
                    showNotification('⏰ Время истекло', `Цель не выполнена. Выполнено: ${currentGoal.currentCount}/${currentGoal.targetCount}`);
                } else if (currentGoal.currentCount > oldCount) {
                    // Новый бан - показываем уведомление
                    const remaining = currentGoal.targetCount - currentGoal.currentCount;
                    showNotification('✓ Прогресс обновлён', `Осталось: ${remaining} банов`);
                }
                
                saveGoal();
                displayGoal();
                
            } catch (error) {
                console.error('[Ban Goals] Error checking progress:', error);
            }
        }
        
        function showNotification(title, message) {
            // Используем браузерные уведомления
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, {
                    body: message,
                    icon: './9574.ico'
                });
            }
            
            // Также показываем alert для надёжности
            console.log(`[Ban Goals] ${title}: ${message}`);
        }
        
        // Запрашиваем разрешение на уведомления
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    </script>
    <script src="js/ButtonClickSound.js?v=1"></script>
</body>
</html>
