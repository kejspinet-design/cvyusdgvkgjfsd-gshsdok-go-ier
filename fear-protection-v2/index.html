    <link rel="icon" href="./9574.ico" type="image/x-icon">
    <script>
        // Проверяем авторизацию
        const token = localStorage.getItem('fearToken');
        if (token) {
            // Если есть токен - редирект на anticheat
            window.location.href = 'anticheat.html';
